apiVersion: apps/v1 
kind: Deployment
metadata:
  name: config-server

spec:
  replicas: 1
  selector:
    matchLabels:
      app: config-server
  template:
    metadata:
      labels:
        app: config-server
    spec:
      containers:
        - name: config-server
          image: petclinic-config-server:local 
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080
            
---
apiVersion: v1
kind: Service 
metadata: 
  name: config-server 
spec: 
  selector: 
    app: config-server 
  ports: 
    - port: 8080 
      targetPort: 8080
---
