apiVersion: apps/v1
kind: Deployment
metadata:
  name: api-gateway 
spec:
  replicas: 1
  selector:
    matchLabels:
      app: api-gateway
  template:
    metadata:
      labels:
        app: api-gateway
    spec:
      containers:
        - name: api-gateway
          image: petclinic-api-gateway:local
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8080

--- 

apiVersion: v1
kind: Service 
metadata:
  name: api-gateway
spec:
  type: LoadBalancer
  selector:
    app: api-gateway
  ports:
    - port: 80
      targetPort: 8080

---
