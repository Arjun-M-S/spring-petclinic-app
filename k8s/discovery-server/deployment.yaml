apiVersion: apps/v1 
kind: Deployment
metadata: 
  name: discovery-server
spec: 
  replicas: 1
  selector: 
    matchLabels: 
      app: discovery-server
  template: 
    metadata:
      labels:
        app: discovery-server
    spec: 
      containers: 
          - name: discovery-server 
            image: petclinic-discovery-server:local 
            imagePullPolicy: IfNotPresent
            ports: 
              - containerPort: 8080
            resources:
              requests:
                memory: "256Mi"
                cpu: "200m"
              limits:
                memory: "512Mi" 
                cpu: "500m"
            env:
            - name: JAVA_OPTS
              value: "-XX:MaxRAMPercentage=75.0"