apiVersion: apps/v1 
kind: Deployment
metadata:
  name: config-server

spec:
  replicas: 1
  selector:
    matchLabels:
      app: config-server
  template:
    metadata:
      labels:
        app: config-server
    spec:
      containers:
        - name: config-server
          image: petclinic-config-server:local 
          imagePullPolicy: IfNotPresent
          ports:
            - containerPort: 8888
          resources:
          requests:
            memory: "256Mi"
            cpu: "200m"
          limits:
            memory: "512Mi" 
            cpu: "500m"
          env:
          - name: JAVA_OPTS
            value: "-XX:MaxRAMPercentage=75.0"
