apiVersion: apps/v1
kind: Deployment
metadata:
  name: customers-service
spec:
  replicas: 1
  selector:
    matchLabels:
      app: customers-service
  template:
    metadata:
      labels:
        app: customers-service
    spec:
      containers:
      - name: customers-service
        # ArgoCD will eventually update this image tag automatically!
        image: petclinic-customers-service:local
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 8080
        
        # --- THE 16GB WINDOWS LAPTOP FIX ---
        resources:
          requests:
            memory: "256Mi"
            cpu: "200m"
          limits:
            memory: "512Mi" 
            cpu: "500m"
        env:
        - name: JAVA_OPTS
          value: "-XX:MaxRAMPercentage=75.0"
