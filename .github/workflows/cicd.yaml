name: CI Pipeline Build - and - push 


on: 
    push: 
        branches: 
            - main
    pull_request: 
        branches: 
            - main


env:
  AWS_REGION: ap-south-2
  ECR_REGISTRY: 

jobs: 
    build-and-push: 
        runs-on: ubuntu-latest
        strategy: 
            matrix: 
                service: [api-gateway, config-server, discovery-server, customers-service, vets-service, visits-service]
    
        steps:
            - name: Checkout code 
              uses: actions/checkout@v3
            
            - name: Set up JDK 17 
              uses: actions/setup-java@v3
              with: 
                distribution: temurin
                java-version: 17
            
            - name: Configure AWS credentials 
              uses: aws-actions/configure-aws-credentials@v2
              with: 
                aws-access-key-id: ${{ secrets.AWS_ACCESS_KEY_ID }}
                aws-secret-access-key: ${{ secrets.AWS_SECRET_ACCESS_KEY }}
                aws-region: ${{ env.AWS_REGION }}
            
            - name: Log in to amazon ECR
              uses: aws-actions/amaozn-ecr-Login@v1 

            - name: Build OCI images using buildbacks
              run: |
                ./mvnw spring-boot:build-image \
                -pl spring-petclinic-${{ matrix.service }} \
                -Dspring-boot.build-image.imageName=${{ env.ECR_REGISTRY }}/petclinic-${{ matrix.service }}:${{ github.sha }}
            
            - name: Push OCI images to Amazon ECR 
              run: |
                docker push ${{env.ECR_REGISTRY}}/petclinic-${{ matrix.service }}:${{ github.sha }}